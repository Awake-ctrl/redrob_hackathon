methodology_summary: |
  Rule-based high-performance filtering and multi-signal scoring pipeline executed entirely via vectorized Pandas math. The architecture uses explicit structural logic constraints to identify and eliminate synthetic honeypot candidates. Features from the candidate profiles are combined with platform behavioral activity metrics to isolate elite product-focused talent while meeting strict CPU execution constraints.

